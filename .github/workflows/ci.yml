name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android command-line tools
        run: |
          export ANDROID_HOME="$RUNNER_TEMP/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o "$RUNNER_TEMP/android-commandline-tools.zip"
          unzip -q "$RUNNER_TEMP/android-commandline-tools.zip" -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses
          sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew :app:testDebugUnitTest

      - name: Build APK
        run: |
          if ./gradlew :app:assembleRelease; then
            echo "APK_VARIANT=release" >> "$GITHUB_ENV"
          else
            echo "Release build failed; falling back to debug APK."
            ./gradlew :app:assembleDebug
            echo "APK_VARIANT=debug" >> "$GITHUB_ENV"
          fi

      - name: Prepare CI APK artifact
        run: |
          mkdir -p artifacts
          if [ "$APK_VARIANT" = "release" ]; then
            cp app/build/outputs/apk/release/*.apk artifacts/ReaMicro-Extend-ci-release.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/ReaMicro-Extend-ci-debug.apk
          fi
          ls -lah artifacts

      - name: Upload CI APK
        uses: actions/upload-artifact@v5
        with:
          name: ReaMicro-Extend-ci-apk
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create CI release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_NAME="$(grep -oE 'versionName[[:space:]]*=[[:space:]]*"[^"]+"' app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          TAG="ci-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          TITLE="CI ${VERSION_NAME} #${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" artifacts/*.apk \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes "Automated CI build from ${GITHUB_SHA}." \
            --prerelease
