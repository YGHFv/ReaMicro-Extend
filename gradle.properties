# Gradle / Kotlin 构建配置（项目级）
#
# 背景：GitHub Actions 的 ubuntu-latest runner 内存有限，Kotlin 编译守护进程
#       使用默认堆时，:app:compileDebugKotlin 会抛出
#       "OutOfMemoryError: GC overhead limit exceeded" 导致 CI 编译失败。
#       Gradle 官方提示的解法即为增大 kotlin.daemon.jvmargs 的 -Xmx。
#       本项目为 Xposed 模块，仅 :app 单模块，下列堆大小在 16GB runner 预算内安全。

# Gradle 守护进程 JVM 参数（堆 + 元空间 + 编码）
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Kotlin 编译守护进程堆（本次 OOM 的直接来源，必须显式加大）
kotlin.daemon.jvmargs=-Xmx3g -Dfile.encoding=UTF-8

# 复用构建缓存，加速后续增量构建
org.gradle.caching=true
